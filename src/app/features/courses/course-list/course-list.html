<app-dashboard-shell>
  <div header class="w-full flex justify-between items-center flex-wrap gap-4">
    <div class="flex items-center gap-3">
      <div class="w-10 h-10 rounded-lg border flex items-center justify-center"
           style="background-color: color-mix(in srgb, var(--primary-500) 10%, transparent);
                  border-color: color-mix(in srgb, var(--primary-500) 20%, transparent);">
        <i class="pi pi-book text-lg" style="color: var(--primary-500)"></i>
      </div>
      <div>
        <h1 class="text-lg font-semibold tracking-tight text-txt-main">Courses</h1>
<!--        <p class="text-xs text-txt-muted mt-0.5">{{ store.totalRecords() }} courses available</p>-->
        <p class="text-xs text-txt-muted mt-0.5">1 courses available</p>

      </div>
    </div>
    <p-button label="New Course" icon="pi pi-plus" size="small" severity="primary" routerLink="/courses/new" />
  </div>

  <ng-container main-content>
    <div class="border border-border-muted bg-panel-bg rounded-xl overflow-hidden backdrop-blur-xl">
      <p-table [value]="store.entities()" responsiveLayout="scroll" [paginator]="true" [rows]="10" styleClass="p-datatable-sm">
        <ng-template pTemplate="header">
          <tr>
            <th class="bg-transparent! text-txt-muted! text-[10px] uppercase tracking-wider">Code</th>
            <th class="bg-transparent! text-txt-muted! text-[10px] uppercase tracking-wider">Name</th>
            <th class="bg-transparent! text-txt-muted! text-[10px] uppercase tracking-wider">Level</th>
            <th class="bg-transparent! text-txt-muted! text-[10px] uppercase tracking-wider">Duration</th>
            <th class="bg-transparent! text-txt-muted! text-[10px] uppercase tracking-wider">Capacity</th>
            <th class="bg-transparent! text-txt-muted! text-[10px] uppercase tracking-wider">Fee</th>
            <th class="bg-transparent! text-txt-muted! text-[10px] uppercase tracking-wider">Status</th>
            <th></th>
          </tr>
        </ng-template>
        <ng-template pTemplate="body" let-c>
          <tr class="border-b border-border-muted/40 hover:bg-white/5 transition-colors">
            <td class="py-3 px-5 font-mono text-xs" style="color: var(--primary-400)">{{ c.code }}</td>
            <td class="py-3 px-5 text-xs font-semibold text-txt-main">{{ c.name }}</td>
            <td class="py-3 px-5 text-xs text-txt-muted">{{ c.level }}</td>
            <td class="py-3 px-5 text-xs text-txt-muted">{{ c.durationWeeks }}w</td>
            <td class="py-3 px-5 text-xs text-txt-muted">{{ c.maxCapacity }}</td>
            <td class="py-3 px-5 text-xs text-txt-muted">
              {{ c.feeStructure ? ('KES ' + c.feeStructure.totalAmount) : '—' }}
            </td>
            <td class="py-3 px-5">
              <p-tag [value]="c.isActive ? 'Active' : 'Inactive'" [severity]="c.isActive ? 'success' : 'secondary'" styleClass="text-[9px]" />
            </td>
            <td class="py-3 px-5">
              <div class="flex items-center gap-1">
                <button [routerLink]="['/courses', c.id, 'edit']" class="w-7 h-7 rounded flex items-center justify-center" style="color: var(--text-muted); border: 1px solid var(--border-default)">
                  <i class="pi pi-pencil text-xs"></i>
                </button>
                <button (click)="confirmDelete(c)" class="w-7 h-7 rounded flex items-center justify-center" style="color: #ef4444; border: 1px solid #ef444440">
                  <i class="pi pi-trash text-xs"></i>
                </button>
              </div>
            </td>
          </tr>
        </ng-template>
      </p-table>
    </div>
  </ng-container>
  <p-confirmDialog />
</app-dashboard-shell>
