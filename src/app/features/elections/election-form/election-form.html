<app-dashboard-shell>
  <div header class="w-full flex justify-between items-center flex-wrap gap-4">
    <div class="flex items-center gap-3">
      <div class="w-10 h-10 rounded-lg border flex items-center justify-center"
           style="background-color: color-mix(in srgb, var(--primary-500) 10%, transparent);
                  border-color: color-mix(in srgb, var(--primary-500) 20%, transparent);">
        <i class="pi pi-calendar-plus text-lg" style="color: var(--primary-500)"></i>
      </div>
      <div>
        <h1 class="text-lg font-semibold tracking-tight text-txt-main">New Election</h1>
        <p class="text-xs text-txt-muted mt-0.5">Create a voting window for club leadership</p>
      </div>
    </div>
    <div class="flex items-center gap-3">
      <p-button label="Cancel" icon="pi pi-times" size="small" [outlined]="true" severity="secondary" routerLink="/elections" />
      <p-button label="Save Election" icon="pi pi-check" size="small" severity="primary" [loading]="store.isLoading()" (onClick)="submit()" />
    </div>
  </div>

  @if (store.error()) {
    <div class="border border-red-500/30 bg-red-500/10 rounded-lg p-3 text-xs text-red-400">
      <i class="pi pi-exclamation-circle mr-2"></i>{{ store.error() }}
    </div>
  }

  <ng-container main-content>
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
      <div class="border border-border-muted bg-panel-bg rounded-xl p-5 backdrop-blur-xl flex flex-col gap-4">
        <h3 class="text-sm font-semibold text-txt-main flex items-center gap-2">
          <i class="pi pi-check-square text-primary-400"></i> Election
        </h3>

        <div class="flex flex-col gap-1">
          <label class="text-xs text-txt-muted">Title *</label>
          <input pInputText [(ngModel)]="form.title" placeholder="2026 Club Leadership Election" class="w-full text-sm" />
        </div>

        <div class="flex flex-col gap-1">
          <label class="text-xs text-txt-muted">Description</label>
          <textarea
            [(ngModel)]="form.description"
            rows="5"
            class="w-full text-sm rounded-md px-3 py-2 outline-none"
            style="background: var(--bg-panel); border: 1px solid var(--border-default); color: var(--text-primary); resize: vertical;"></textarea>
        </div>
      </div>

      <div class="border border-border-muted bg-panel-bg rounded-xl p-5 backdrop-blur-xl flex flex-col gap-4">
        <h3 class="text-sm font-semibold text-txt-main flex items-center gap-2">
          <i class="pi pi-clock text-primary-400"></i> Voting Window
        </h3>

        <div class="flex flex-col gap-1">
          <label class="text-xs text-txt-muted">Starts At</label>
          <input pInputText type="datetime-local" [(ngModel)]="form.startsAt" class="w-full text-sm" />
        </div>

        <div class="flex flex-col gap-1">
          <label class="text-xs text-txt-muted">Ends At</label>
          <input pInputText type="datetime-local" [(ngModel)]="form.endsAt" class="w-full text-sm" />
        </div>

        @if (!form.endsAt) {
          <div class="flex flex-col gap-1">
            <label class="text-xs text-txt-muted">Window Hours</label>
            <input pInputText type="number" min="1" [(ngModel)]="form.votingWindowHours" class="w-full text-sm" />
          </div>
        }
      </div>
    </div>
  </ng-container>

  <ng-container side-panel>
    <div class="border border-border-muted bg-panel-bg rounded-xl p-5 backdrop-blur-xl flex flex-col gap-3">
      <h3 class="text-sm font-semibold text-txt-main tracking-tight">Positions</h3>
      @for (position of ['Chairman', 'Vice Chair', 'Secretary', 'Vice Secretary', 'Treasurer']; track position) {
        <div class="flex items-center gap-2 text-xs">
          <i class="pi pi-circle-fill text-[6px]" style="color: var(--primary-400)"></i>
          <span class="text-txt-main">{{ position }}</span>
        </div>
      }
    </div>
  </ng-container>
</app-dashboard-shell>
